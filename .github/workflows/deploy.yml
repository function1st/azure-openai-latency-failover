name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: string
        default: poc
      resource_group:
        description: Azure resource group name
        required: true
        type: string
      location:
        description: Azure region
        required: true
        type: string
        default: eastus2

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        id: bicep
        run: |
          DEPLOYMENT_NAME="deploy-$(date +%s)"
          az deployment group create \
            -g ${{ inputs.resource_group }} \
            -f infra/main.bicep \
            -p @infra/${{ inputs.environment }}.bicepparam \
            --name "$DEPLOYMENT_NAME"

          FUNC_APP_NAME=$(az deployment group show \
            -g ${{ inputs.resource_group }} \
            -n "$DEPLOYMENT_NAME" \
            --query "properties.outputs.functionAppName.value" -o tsv)
          echo "func_app_name=${FUNC_APP_NAME}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build probe function
        working-directory: src/probe-function
        run: |
          npm ci
          npm run build

      - name: Deploy Function App
        uses: azure/functions-action@v2
        with:
          app-name: ${{ steps.bicep.outputs.func_app_name }}
          package: src/probe-function
